name: Esteira Completa

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Simulação de Linter
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Linter simulation
        run: echo "Executando Linter... Tudo limpo!"

  # Job 2: Build (Aqui estava o erro)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create dist folder
        run: |
          mkdir -p dist
          # Ajustado para pegar os arquivos de dentro de src/
          cp src/index.html dist/
          cp -r src/css dist/ 2>/dev/null || echo "CSS não encontrado"
          cp -r src/img dist/ 2>/dev/null || echo "Imagens não encontradas"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist/

  # Job 3: Deploy
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist