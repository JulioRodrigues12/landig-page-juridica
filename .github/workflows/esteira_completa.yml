name: Esteira Completa

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Test (Simulação de Linter)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Linter simulation
        run: echo "Executando Linter... Tudo limpo!"

  # Job 2: Build (CONFIGURADO PARA FALHAR)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create build folder
        run: |
          mkdir -p build
          cp src/*.html build/
          cp -r src/css build/ 2>/dev/null || echo "Sem CSS"
          cp -r src/img build/ 2>/dev/null || echo "Sem IMG"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist/  # O erro acontece aqui: ele vai procurar 'dist', mas você criou 'build'

  # Job 3: Deploy
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist