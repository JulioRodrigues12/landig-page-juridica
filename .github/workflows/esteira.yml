name: Esteira Inquebrável

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  validar-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar htmlhint
        run: npm install -g htmlhint

      - name: Validar HTML
        run: htmlhint "**/*.html"

  validar-css:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Criar config padrão
        run: |
          echo '{
            "extends": "stylelint-config-standard"
          }' > .stylelintrc.json

      - name: Validar CSS
        run: stylelint "**/*.css"

  preparar-entrega:
    runs-on: ubuntu-latest
    needs:
      - validar-html
      - validar-css

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar pasta dist
        run: mkdir dist